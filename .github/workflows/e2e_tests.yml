name: Frontend E2E Tests

on:
  push:
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: timeusediary_db
          POSTGRES_USER: timeusediary_user
          POSTGRES_PASSWORD: timeusediary_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U timeusediary_user -d timeusediary_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python and uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nginx gettext-base curl

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --frozen

      - name: Install frontend Playwright dependencies
        working-directory: frontend
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Configure nginx and frontend settings
        run: |
          sudo systemctl stop nginx || true
          export FRONTEND_PATH="$GITHUB_WORKSPACE/frontend/src/"
          envsubst '$FRONTEND_PATH' < dev_tools/ci/webserver_config/ci.nginx.conf > /tmp/nginx.conf
          cp dev_tools/ci/frontend_settings/tud_settings.ci.js frontend/src/settings/tud_settings.js
          # Allow nginx worker processes (www-data) to read and traverse to frontend files
          # Parent directories need execute permission for traversal
          chmod o+x "$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/frontend" "$GITHUB_WORKSPACE/frontend/src"
          # All files and subdirectories need proper permissions
          chmod -R u=rwX,g=rX,o=rX "$GITHUB_WORKSPACE/frontend/src/"
          find "$GITHUB_WORKSPACE/frontend/src/" -type f -exec chmod o+r {} \;
          # Verify permissions
          ls -ld "$GITHUB_WORKSPACE/frontend/src"
          ls -la "$GITHUB_WORKSPACE/frontend/src/" | head -20
          sudo nginx -c /tmp/nginx.conf -p /tmp/

      - name: Run backend and Playwright tests
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000/report/
        run: |
          set -euxo pipefail

          cp dev_tools/ci/backend_settings/.env.ci backend/.env
          cd backend
          uv run uvicorn o_timeusediary_backend.api:app --host 127.0.0.1 --port 8000 > /tmp/backend.log 2>&1 &
          backend_pid=$!

          sleep 5
          cat /tmp/backend.log

          cd ..

          trap 'kill "$backend_pid" || true' EXIT

          timeout 60s bash -c 'until curl -fsS http://127.0.0.1:8000/api/health > /dev/null; do sleep 2; done'
          timeout 60s bash -c 'until curl -fsS http://127.0.0.1:3000/tud_backend/api/health > /dev/null; do sleep 2; done'
          timeout 60s bash -c 'until curl -fsS http://127.0.0.1:3000/report/index.html > /dev/null; do sleep 2; done'

          cd frontend
          npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: frontend/playwright-report/
          if-no-files-found: ignore

      - name: Upload backend log
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: backend-log
          path: /tmp/backend.log
          if-no-files-found: ignore

      - name: Upload nginx logs
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: nginx-logs
          path: /tmp/*.log
          if-no-files-found: ignore