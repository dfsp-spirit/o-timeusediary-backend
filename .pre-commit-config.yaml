repos:
  # Python backend
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^backend/.*\.py$
      - id: ruff-format
        files: ^backend/.*\.py$

  # Prettier for frontend formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: ^frontend/src/.*\.(js|jsx|ts|tsx|css|scss|json|md)$
        exclude: ^frontend/src/assets/

  # ESLint 8 for code quality (simpler config)
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.53.0  # Last version with .eslintrc support
    hooks:
      - id: eslint
        files: ^frontend/src/.*\.(js|jsx|ts|tsx)$
        exclude: ^frontend/src/assets/
        additional_dependencies:
          - eslint@8.53.0